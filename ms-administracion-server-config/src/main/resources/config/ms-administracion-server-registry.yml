server:
  port: 8889

eureka:
   instance:
      hostname: eureka-server
   client:
      register-with-eureka: false
      fetch-registry: false
      service-url:
       defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
   server:
      wait-time-in-ms-when-sync-empty: 0

    